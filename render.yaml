previewsEnabled: false

databases:
  - name: lightdash-database
    ipAllowList: []
    plan: basic-256mb

services:
  # type: pserv = Render private service — no public URL is assigned.
  # The only way to reach this instance is through Tailscale.
  - type: pserv
    plan: starter
    env: docker
    name: lightdash-server
    dockerContext: .
    dockerfilePath: dockerfile
    envVars:
      - key: PGHOST
        fromDatabase:
          name: lightdash-database
          property: host
      - key: PGPORT
        fromDatabase:
          name: lightdash-database
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: lightdash-database
          property: database
      - key: PGUSER
        fromDatabase:
          name: lightdash-database
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: lightdash-database
          property: password
      - key: TRUST_PROXY
        value: true
      - key: SECURE_COOKIES
        value: false
      - key: LIGHTDASH_SECRET
        generateValue: true
      - key: PORT
        value: 8080
      # e.g. https://lightdash.tailad4ebd.ts.net
      - key: SITE_URL
        sync: false
      # Generate an ephemeral pre-authorized key at:
      # https://login.tailscale.com/admin/settings/keys
      # Enable "Ephemeral" so the device is removed when the container stops.
      - key: TAILSCALE_AUTH_KEY
        sync: false
      # The device name shown in the Tailscale admin console
      - key: TAILSCALE_HOSTNAME
        value: lightdash
    disk:
      name: tailscale-state
      mountPath: /var/lib/tailscale
      sizeGB: 1
